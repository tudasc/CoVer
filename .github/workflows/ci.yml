name: CI

on: [push, pull_request]

permissions:
  checks: write

jobs:
  build-linux:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      LLVM_VER: "22"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install default-jre libdw-dev wget ccache
      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh ${{ env.LLVM_VER }} all
          sudo ln -s /usr/lib/llvm-${{ env.LLVM_VER }}/build/utils/lit/lit.py /usr/bin/lit
          sudo apt install flang-${{ env.LLVM_VER }}
          sudo ln -s /usr/lib/llvm-${{ env.LLVM_VER }}/bin/flang /usr/bin/flang
          echo "/usr/lib/llvm-${{ env.LLVM_VER }}/bin/" >> "$GITHUB_PATH"
      - name: Cache OpenMPI
        id: cache-openmpi
        uses: actions/cache@v5
        with:
          path: ~/ompi_inst
          key: ${{ runner.os }}-openmpi-llvm_${{ env.LLVM_VER }}
      - name: Compile and Install OpenMPI if not cached
        if: steps.cache-openmpi.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/open-mpi/ompi/
          cd ompi
          mkdir -p ~/ompi_inst
          ./autogen.pl
          ./configure CC=clang CXX=clang++ FC=flang --prefix=$HOME/ompi_inst --with-pmix=internal
          make -j8
          make install
      - name: Add OpenMPI to PATH
        run: echo "$HOME/ompi_inst/bin" >> "$GITHUB_PATH"
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-llvm_${{ env.LLVM_VER }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-llvm_${{ env.LLVM_VER }}-ccache-
      - name: CMake configure
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 1G
          mkdir build
          cd build
          cmake .. -DENABLE_TESTS=ON -DCMAKE_PREFIX_PATH=/usr/lib/llvm-${{ env.LLVM_VER }}/ -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DMPI_HOME=$HOME/ompi_inst
      - name: Build
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          cd build
          cmake --build . -j8
          sudo cmake --build . --target install
      - name: Run CTest
        run: |
          cd build
          ctest --output-on-failure --output-junit report.xml
      - name: Postprocess JUnit XML
        if: success() || failure() # Run even if tests fail
        run: |
          python Tests/enrich_xunit.py build/report.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: CTest/Lit Test Report
          report_paths: build/report.xml
