name: CI

on: [push, pull_request]

permissions:
  checks: write

jobs:
  build-linux:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install default-jre libdw-dev wget
      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
          sudo ln -s /usr/lib/llvm-21/build/utils/lit/lit.py /usr/bin/lit
          sudo apt install flang-21
          echo "/usr/lib/llvm-21/bin/" >> "$GITHUB_PATH"
      - name: Compile OpenMPI
        run: |
          wget https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.10.tar.bz2
          tar xvf openmpi-5.0.10.tar.bz2
          cd openmpi-5.0.10
          ./configure CC=clang CXX=clang++ FC=flang
          make -j
          sudo make install
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: CMake configure
        run: |
          mkdir build
          cd build
          cmake .. -DENABLE_TESTS=ON -DCMAKE_PREFIX_PATH=/usr/lib/llvm-21/
      - name: Build
        run: |
          cd build
          cmake --build . -j8
          sudo cmake --build . --target install
      - name: Run CTest
        run: |
          cd build
          ctest --output-on-failure --output-junit report.xml
      - name: Postprocess JUnit XML
        if: success() || failure() # Run even if tests fail
        run: |
          python Tests/enrich_xunit.py build/report.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: CTest/Lit Test Report
          report_paths: build/report.xml
