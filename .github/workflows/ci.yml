name: CI

on: [push, pull_request]

jobs:
  build-linux:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install default-jre libdw-dev libopenmpi-dev openmpi-bin python3-pip
          pip install lit --break-system-packages
      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21
          sudo ln -s /usr/lib/llvm-21/build/utils/lit/lit.py /usr/bin/lit
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: CMake configure
        run: |
          mkdir build
          cd build
          cmake .. -DENABLE_TESTS=ON -DCMAKE_PREFIX_PATH=/usr/lib/llvm-21/
      - name: Build
        run: |
          cd build
          cmake --build . -j8
      - name: Run CTest
        run: |
          cd build
          ctest --output-on-failure --output-junit report.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # Run even if tests fail
        with:
          report_paths: '**/build/report.xml'
