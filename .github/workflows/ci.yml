name: CI

on: [push, pull_request]

jobs:
  build-linux:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install default-jre libdw-dev libopenmpi-dev openmpi-bin
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1"
      - name: CMake configure
        run: |
          mkdir build
          cd build
          cmake .. -DENABLE_TESTS=ON
      - name: Build
        run: |
          cd build
          cmake --build . -j8
      - name: Run CTest
        run: |
          cd build
          ctest --output-on-failure --output-junit report.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # Run even if tests fail
        with:
          report_paths: '**/build/report.xml'
